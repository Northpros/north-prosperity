<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="16" fill="#0b1220"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#f59e0b" stroke-width="1.2" opacity="0.6"/>
  <!-- Inner ring -->
  <circle cx="16" cy="16" r="7" fill="none" stroke="#f59e0b" stroke-width="1"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2.5" fill="#f59e0b"/>
  <!-- North pointer (amber, solid) -->
  <polygon points="16,4 17.8,14 16,12.5 14.2,14" fill="#f59e0b"/>
  <!-- South pointer (amber, dim) -->
  <polygon points="16,28 14.2,18 16,19.5 17.8,18" fill="#f59e0b" opacity="0.35"/>
  <!-- Tick marks at E/W -->
  <line x1="3" y1="16" x2="6" y2="16" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
  <line x1="26" y1="16" x2="29" y2="16" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
</svg>
